model:
  backbone: "distilbert-base-uncased"   # lightweight backbone for reward model
  dtype: "float32"
  hidden_size: 768
  dropout: 0.1

training:
  learning_rate: 2e-5
  batch_size: 16
  num_epochs: 5
  max_length: 512
  warmup_steps: 100
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42
  logging_steps: 10
  save_steps: 50
  eval_steps: 25

data:
  dataset_path: "data/contrastive_pairs.jsonl"
  train_split: 0.85
  val_split: 0.1
  test_split: 0.05

evaluation:
  compute_calibration: true
  plot_score_distribution: true
  output_dir: "checkpoints/reward_model/eval"

tracking:
  experiment_name: "reward_model_baseline"
  log_every_n_steps: 10
  save_every_n_steps: 50
  output_dir: "checkpoints/reward_model"
