model:
  name: "microsoft/phi-2"
  dtype: "float16"
  trust_remote_code: true

training:
  learning_rate: 1e-5
  batch_size: 4
  num_generations: 4          # G: number of responses per prompt
  max_steps: 1000
  max_length: 512
  max_new_tokens: 128
  seed: 42
  temperature: 1.0
  top_p: 0.95
  kl_coef: 0.1
  clip_range: 0.2
  logging_steps: 10
  save_steps: 100

data:
  dataset_path: "data/contrastive_pairs.jsonl"
  max_samples: 1000

reward:
  model_path: "checkpoints/reward_model"
  normalize_rewards: true

tracking:
  experiment_name: "grpo_baseline"
  log_every_n_steps: 10
  save_every_n_steps: 100
  output_dir: "checkpoints/grpo"
