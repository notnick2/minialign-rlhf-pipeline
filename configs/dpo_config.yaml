model:
  name: "microsoft/phi-2"
  dtype: "float16"
  trust_remote_code: true

training:
  beta: 0.1
  learning_rate: 1e-5
  batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 3
  max_length: 512
  max_prompt_length: 256
  warmup_steps: 50
  weight_decay: 0.01
  seed: 42
  fp16: true
  logging_steps: 10
  save_steps: 100

data:
  dataset_path: "data/contrastive_pairs.jsonl"
  train_split: 0.9
  val_split: 0.1

peft:
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj"]

tracking:
  experiment_name: "dpo_baseline"
  log_every_n_steps: 10
  save_every_n_steps: 100
  output_dir: "checkpoints/dpo"
