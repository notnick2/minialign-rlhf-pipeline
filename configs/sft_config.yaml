model:
  name: "microsoft/phi-2"
  dtype: "float16"
  max_length: 512
  trust_remote_code: true

training:
  learning_rate: 2e-5
  batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 3
  warmup_steps: 100
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42
  fp16: true
  logging_steps: 10
  save_steps: 100
  eval_steps: 50

data:
  dataset_path: "data/sft_curated.jsonl"
  train_split: 0.9
  val_split: 0.1
  instruction_template: "### Instruction:\n{instruction}\n\n### Response:\n{response}"
  max_samples: null  # null means use all

peft:
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj"]

tracking:
  experiment_name: "sft_baseline"
  log_every_n_steps: 10
  save_every_n_steps: 100
  output_dir: "checkpoints/sft"
